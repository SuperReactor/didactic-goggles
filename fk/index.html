<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <!-- Mobile / PWA -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Icons -->
    <link rel="apple-touch-icon" sizes="48x48" href="assets/icon_48.png">
    <link rel="apple-touch-icon" sizes="72x72" href="assets/icon_72.png">
    <link rel="apple-touch-icon" sizes="128x128" href="assets/icon_128.png">
    <link rel="apple-touch-icon" sizes="144x144" href="assets/icon_144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="assets/icon_152.png">
    <link rel="apple-touch-icon" sizes="192x192" href="assets/icon_192.png">
    <link rel="apple-touch-icon" sizes="256x256" href="assets/icon_256.png">
    <link rel="apple-touch-icon" sizes="512x512" href="assets/icon_512.png">

    <!-- PWA Manifest + Favicon -->
    <link rel="manifest" href="assets/manifest.json">
    <link rel="icon" href="favicon.ico">

    <!-- iOS App Banner -->
    <meta name="apple-itunes-app" content="app-id=1083123814">

    <title>Funky Karts Demo</title>

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background-color: #100009;
            color: #fcfad3;
            font-family: Georgia, cursive;
            font-size: 2em;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        canvas#display {
            display: block;
            outline: none;

            width: 100%;
            height: 100%;

            max-width: 180vh;
            max-height: 75vw;
        }

        p {
            padding: 2em;
        }
    </style>
</head>

<body>
    <canvas id="display" oncontextmenu="event.preventDefault()">
        Your browser does not support HTML5 canvas.
    </canvas>

    <!-- Use defer so JS runs after DOM loads -->
    <script src="demo.js" defer></script>
</body>
</html>
